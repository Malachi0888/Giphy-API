<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giphy API Search</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <h1 class="mb-3">Fetch GIFs from Giphy</h1>
      <p class="text-secondary">Search for any keyword and click the button.</p>

      <div class="row g-2 align-items-center mb-4">
        <div class="col-md-8">
          <input
            id="search-input"
            type="text"
            class="form-control"
            placeholder="Try: cats, coding, celebration..."
            value="cats"
          />
        </div>
        <div class="col-md-4 d-grid">
          <button id="fetch-gif-btn" class="btn btn-primary">Fetch GIFs</button>
        </div>
      </div>

      <div id="status-message" class="mb-3 text-secondary"></div>
      <section id="gif-container" class="row"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
